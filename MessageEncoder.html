// Populate dropdown
const select = document.getElementById("fontSelect");
for (let name in fonts) {
    let option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
}

// Encoding function
function encodeText() {
    const input = document.getElementById("inputText").value;
    const fontName = document.getElementById("fontSelect").value;
    const font = fonts[fontName];

    let output = "";

    for (let char of input) {
        let index = base.indexOf(char);

        if (index !== -1 && font[index]) {
            output += font[index];
        } else {
            output += char;
        }
    }

    document.getElementById("outputText").value = output;
}

// Live typing + font switching
document.getElementById("inputText").addEventListener("input", encodeText);
document.getElementById("fontSelect").addEventListener("change", encodeText);
</script>
